<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="900" height="480" fill="#fdfbf6"/>

  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#14202b">Bottled Water Production Line — System Architecture</text>

  <!-- Layer 1: Physical -->
  <g>
    <rect x="40" y="60" width="820" height="80" fill="#eef2f5" stroke="#bcc5cc"/>
    <text x="60" y="85" font-size="12" font-weight="700" fill="#3a4856">PHYSICAL LAYER · 5 Stations</text>

    <rect x="60"  y="95" width="148" height="36" fill="#fff" stroke="#3a4856"/>
    <text x="134" y="118" text-anchor="middle" font-size="12" fill="#14202b">1. Bottle Blow</text>

    <rect x="220" y="95" width="148" height="36" fill="#fff" stroke="#3a4856"/>
    <text x="294" y="118" text-anchor="middle" font-size="12" fill="#14202b">2. Water Fill</text>

    <rect x="380" y="95" width="148" height="36" fill="#fff" stroke="#3a4856"/>
    <text x="454" y="118" text-anchor="middle" font-size="12" fill="#14202b">3. Cap On</text>

    <rect x="540" y="95" width="148" height="36" fill="#fff" stroke="#3a4856"/>
    <text x="614" y="118" text-anchor="middle" font-size="12" fill="#14202b">4. Label</text>

    <rect x="700" y="95" width="148" height="36" fill="#fff" stroke="#3a4856"/>
    <text x="774" y="118" text-anchor="middle" font-size="12" fill="#14202b">5. QC &amp; Pack</text>
  </g>

  <!-- Arrow down 1 -->
  <line x1="450" y1="140" x2="450" y2="160" stroke="#c64b1e" stroke-width="2"/>
  <polygon points="445,158 455,158 450,170" fill="#c64b1e"/>

  <!-- Layer 2: Back end -->
  <g>
    <rect x="40" y="175" width="820" height="80" fill="#fef0e8" stroke="#c64b1e"/>
    <text x="60" y="200" font-size="12" font-weight="700" fill="#c64b1e">BACK-END · production_line.py · Abstract Station base · FSM · E10 state log</text>

    <rect x="80"  y="212" width="220" height="32" fill="#fff" stroke="#c64b1e"/>
    <text x="190" y="232" text-anchor="middle" font-size="12" fill="#14202b">Station orchestrator</text>

    <rect x="320" y="212" width="220" height="32" fill="#fff" stroke="#c64b1e"/>
    <text x="430" y="232" text-anchor="middle" font-size="12" fill="#14202b">Bottle state machine (FSM)</text>

    <rect x="560" y="212" width="220" height="32" fill="#fff" stroke="#c64b1e"/>
    <text x="670" y="232" text-anchor="middle" font-size="12" fill="#14202b">Defect / fault detection</text>
  </g>

  <!-- Branches -->
  <line x1="280" y1="255" x2="280" y2="285" stroke="#3a4856" stroke-width="2"/>
  <polygon points="275,283 285,283 280,295" fill="#3a4856"/>
  <line x1="620" y1="255" x2="620" y2="285" stroke="#3a4856" stroke-width="2"/>
  <polygon points="615,283 625,283 620,295" fill="#3a4856"/>

  <!-- Front-end + data pipeline -->
  <g>
    <rect x="40" y="300" width="380" height="80" fill="#eaf3ee" stroke="#3a8060"/>
    <text x="60" y="325" font-size="12" font-weight="700" fill="#235843">FRONT-END · HMI (animation.py)</text>
    <rect x="80" y="338" width="320" height="30" fill="#fff" stroke="#3a8060"/>
    <text x="240" y="358" text-anchor="middle" font-size="12" fill="#14202b">Start · Stop · Reset · live state · fault alarms</text>
  </g>

  <g>
    <rect x="480" y="300" width="380" height="80" fill="#e8eef5" stroke="#3a5680"/>
    <text x="500" y="325" font-size="12" font-weight="700" fill="#1f3a5c">DATA PIPELINE</text>
    <rect x="500" y="338" width="100" height="30" fill="#fff" stroke="#3a5680"/>
    <text x="550" y="358" text-anchor="middle" font-size="11" fill="#14202b">producer.py</text>
    <text x="615" y="358" text-anchor="middle" font-size="14" fill="#3a5680">→</text>
    <rect x="630" y="338" width="90" height="30" fill="#fff" stroke="#3a5680"/>
    <text x="675" y="358" text-anchor="middle" font-size="11" fill="#14202b">InfluxDB</text>
    <text x="735" y="358" text-anchor="middle" font-size="14" fill="#3a5680">→</text>
    <rect x="750" y="338" width="90" height="30" fill="#fff" stroke="#3a5680"/>
    <text x="795" y="358" text-anchor="middle" font-size="11" fill="#14202b">Grafana</text>
  </g>

  <!-- Layer 3: MES / Docker -->
  <line x1="230" y1="380" x2="230" y2="405" stroke="#3a4856" stroke-width="2"/>
  <polygon points="225,403 235,403 230,415" fill="#3a4856"/>
  <line x1="670" y1="380" x2="670" y2="405" stroke="#3a4856" stroke-width="2"/>
  <polygon points="665,403 675,403 670,415" fill="#3a4856"/>

  <g>
    <rect x="40" y="420" width="820" height="50" fill="#14202b"/>
    <text x="60" y="442" font-size="12" font-weight="700" fill="#c64b1e">ORCHESTRATION · Docker containers · MES at ISA-95 Level 3</text>
    <text x="60" y="460" font-size="11" fill="#d8d2c5">Each service (HMI, back-end, producer, InfluxDB, Grafana) ships as its own container.</text>
  </g>
</svg>
