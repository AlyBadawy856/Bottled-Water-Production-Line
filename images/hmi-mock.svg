<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="700" height="420" fill="#0f1922"/>

  <!-- Top status bar -->
  <rect x="0" y="0" width="700" height="44" fill="#14202b"/>
  <circle cx="24" cy="22" r="8" fill="#4ea682"/>
  <text x="42" y="27" font-size="13" font-weight="700" fill="#f3efe6">BOTTLING LINE 01 · PRODUCTIVE</text>
  <text x="500" y="20" font-size="11" fill="#b8b0a0">Shift A</text>
  <text x="500" y="35" font-size="11" fill="#b8b0a0">Operator · Ahmed K.</text>
  <text x="640" y="27" font-size="13" font-weight="700" fill="#c64b1e" font-family="Consolas, monospace">14:22</text>

  <!-- KPI cards -->
  <g>
    <rect x="20" y="64" width="200" height="80" fill="#1f2c3a" stroke="#2c3a4a"/>
    <text x="30" y="84" font-size="11" fill="#b8b0a0">OEE</text>
    <text x="30" y="120" font-size="32" font-weight="700" fill="#4ea682" font-family="Consolas, monospace">88.1%</text>
    <text x="30" y="138" font-size="10" fill="#7a8088">target ≥ 85%</text>
  </g>

  <g>
    <rect x="240" y="64" width="200" height="80" fill="#1f2c3a" stroke="#2c3a4a"/>
    <text x="250" y="84" font-size="11" fill="#b8b0a0">BOTTLES / HR</text>
    <text x="250" y="120" font-size="32" font-weight="700" fill="#f3efe6" font-family="Consolas, monospace">1,860</text>
    <text x="250" y="138" font-size="10" fill="#7a8088">ideal 2,100</text>
  </g>

  <g>
    <rect x="460" y="64" width="220" height="80" fill="#1f2c3a" stroke="#2c3a4a"/>
    <text x="470" y="84" font-size="11" fill="#b8b0a0">QUALITY</text>
    <text x="470" y="120" font-size="32" font-weight="700" fill="#f3efe6" font-family="Consolas, monospace">99.4%</text>
    <text x="470" y="138" font-size="10" fill="#7a8088">scrap 0.6%</text>
  </g>

  <!-- Station strip -->
  <text x="20" y="180" font-size="12" font-weight="700" fill="#b8b0a0">STATIONS</text>

  <g>
    <rect x="20" y="195" width="125" height="80" fill="#1f2c3a" stroke="#4ea682" stroke-width="2"/>
    <text x="83" y="218" text-anchor="middle" font-size="12" fill="#f3efe6">BOTTLE BLOW</text>
    <circle cx="83" cy="245" r="10" fill="#4ea682"/>
    <text x="83" y="268" text-anchor="middle" font-size="10" fill="#4ea682">RUN</text>
  </g>

  <g>
    <rect x="155" y="195" width="125" height="80" fill="#1f2c3a" stroke="#4ea682" stroke-width="2"/>
    <text x="217" y="218" text-anchor="middle" font-size="12" fill="#f3efe6">WATER FILL</text>
    <circle cx="217" cy="245" r="10" fill="#4ea682"/>
    <text x="217" y="268" text-anchor="middle" font-size="10" fill="#4ea682">RUN</text>
  </g>

  <g>
    <rect x="290" y="195" width="125" height="80" fill="#1f2c3a" stroke="#c64b1e" stroke-width="2"/>
    <text x="352" y="218" text-anchor="middle" font-size="12" fill="#f3efe6">CAP ON</text>
    <circle cx="352" cy="245" r="10" fill="#c64b1e"/>
    <text x="352" y="268" text-anchor="middle" font-size="10" fill="#c64b1e">FAULT</text>
  </g>

  <g>
    <rect x="425" y="195" width="125" height="80" fill="#1f2c3a" stroke="#d4a017" stroke-width="2"/>
    <text x="487" y="218" text-anchor="middle" font-size="12" fill="#f3efe6">LABEL</text>
    <circle cx="487" cy="245" r="10" fill="#d4a017"/>
    <text x="487" y="268" text-anchor="middle" font-size="10" fill="#d4a017">STANDBY</text>
  </g>

  <g>
    <rect x="560" y="195" width="120" height="80" fill="#1f2c3a" stroke="#4ea682" stroke-width="2"/>
    <text x="620" y="218" text-anchor="middle" font-size="12" fill="#f3efe6">QC &amp; PACK</text>
    <circle cx="620" cy="245" r="10" fill="#4ea682"/>
    <text x="620" y="268" text-anchor="middle" font-size="10" fill="#4ea682">RUN</text>
  </g>

  <!-- Alarm strip -->
  <rect x="20" y="300" width="660" height="46" fill="#3a1a10" stroke="#c64b1e"/>
  <circle cx="44" cy="323" r="9" fill="#c64b1e">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="64" y="320" font-size="13" font-weight="700" fill="#f3efe6">CAP ON · cap feeder jam detected</text>
  <text x="64" y="338" font-size="11" fill="#d8d2c5">acknowledge to clear · upstream stations now in starvation</text>

  <!-- Buttons -->
  <rect x="20" y="364" width="100" height="40" fill="#4ea682"/>
  <text x="70" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">START</text>

  <rect x="130" y="364" width="100" height="40" fill="#c64b1e"/>
  <text x="180" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">STOP</text>

  <rect x="240" y="364" width="100" height="40" fill="#1f2c3a" stroke="#3a4856"/>
  <text x="290" y="389" text-anchor="middle" font-size="13" fill="#f3efe6">RESET</text>

  <rect x="560" y="364" width="120" height="40" fill="#1f2c3a" stroke="#3a4856"/>
  <text x="620" y="389" text-anchor="middle" font-size="13" fill="#f3efe6">SHIFT REPORT</text>
</svg>
