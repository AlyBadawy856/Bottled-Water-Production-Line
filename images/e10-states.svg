<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="900" height="420" fill="#fdfbf6"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#14202b">SEMI E10 — Equipment Time Buckets</text>

  <!-- Total time bar -->
  <rect x="60" y="60" width="780" height="40" fill="#14202b"/>
  <text x="450" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#f3efe6">TOTAL TIME</text>

  <!-- Split into Operations Time + Non-Scheduled -->
  <rect x="60" y="120" width="620" height="40" fill="#3a4856"/>
  <text x="370" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#f3efe6">OPERATIONS TIME</text>
  <rect x="680" y="120" width="160" height="40" fill="#7a8088"/>
  <text x="760" y="146" text-anchor="middle" font-size="12" fill="#fff">NON-SCHEDULED</text>

  <!-- Split: Uptime + Downtime -->
  <rect x="60" y="180" width="380" height="40" fill="#3a8060"/>
  <text x="250" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">UPTIME</text>
  <rect x="440" y="180" width="240" height="40" fill="#c64b1e"/>
  <text x="560" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">DOWNTIME</text>

  <!-- Uptime: Productive + Standby + Engineering -->
  <rect x="60" y="240" width="200" height="40" fill="#4ea682"/>
  <text x="160" y="266" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">PRODUCTIVE</text>
  <rect x="260" y="240" width="110" height="40" fill="#6cc09a"/>
  <text x="315" y="266" text-anchor="middle" font-size="11" fill="#14202b">STANDBY</text>
  <rect x="370" y="240" width="70" height="40" fill="#8fd1b1"/>
  <text x="405" y="266" text-anchor="middle" font-size="10" fill="#14202b">ENG.</text>

  <!-- Downtime: Scheduled + Unscheduled -->
  <rect x="440" y="240" width="120" height="40" fill="#d97247"/>
  <text x="500" y="266" text-anchor="middle" font-size="11" fill="#fff">SCHEDULED</text>
  <rect x="560" y="240" width="120" height="40" fill="#a83a14"/>
  <text x="620" y="266" text-anchor="middle" font-size="11" fill="#fff">UNSCHEDULED</text>

  <!-- legend -->
  <g font-size="12" fill="#1f2933">
    <rect x="60" y="320" width="14" height="14" fill="#4ea682"/>
    <text x="82" y="332">Productive — making sellable product</text>

    <rect x="60" y="345" width="14" height="14" fill="#6cc09a"/>
    <text x="82" y="357">Standby (Idle) — ready, no material</text>

    <rect x="60" y="370" width="14" height="14" fill="#8fd1b1"/>
    <text x="82" y="382">Engineering — tests, experiments</text>

    <rect x="460" y="320" width="14" height="14" fill="#d97247"/>
    <text x="482" y="332">Scheduled DT — planned maintenance</text>

    <rect x="460" y="345" width="14" height="14" fill="#a83a14"/>
    <text x="482" y="357">Unscheduled DT — unexpected failure</text>

    <rect x="460" y="370" width="14" height="14" fill="#7a8088"/>
    <text x="482" y="382">Non-Scheduled — plant closed</text>
  </g>
</svg>
