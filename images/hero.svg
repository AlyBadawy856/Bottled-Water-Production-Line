<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2c3a"/>
      <stop offset="100%" stop-color="#3a4856"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c64b1e" opacity="0.18"/>
    </pattern>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cc9e6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3a90b7" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sky)"/>
  <rect width="1200" height="600" fill="url(#dots)"/>

  <!-- factory silhouette -->
  <g fill="#0f1922" opacity="0.85">
    <rect x="60" y="380" width="180" height="220"/>
    <rect x="120" y="320" width="60" height="60"/>
    <rect x="260" y="420" width="220" height="180"/>
    <rect x="500" y="360" width="140" height="240"/>
    <rect x="540" y="280" width="40" height="80"/>
    <rect x="660" y="400" width="260" height="200"/>
    <rect x="940" y="350" width="200" height="250"/>
  </g>

  <!-- windows -->
  <g fill="#c64b1e" opacity="0.45">
    <rect x="80" y="420" width="16" height="16"/>
    <rect x="110" y="420" width="16" height="16"/>
    <rect x="140" y="420" width="16" height="16"/>
    <rect x="170" y="420" width="16" height="16"/>
    <rect x="200" y="420" width="16" height="16"/>
    <rect x="80" y="460" width="16" height="16"/>
    <rect x="110" y="460" width="16" height="16"/>
    <rect x="170" y="460" width="16" height="16"/>
    <rect x="200" y="460" width="16" height="16"/>

    <rect x="290" y="450" width="20" height="20"/>
    <rect x="330" y="450" width="20" height="20"/>
    <rect x="370" y="450" width="20" height="20"/>
    <rect x="410" y="450" width="20" height="20"/>
    <rect x="450" y="450" width="20" height="20"/>

    <rect x="690" y="440" width="22" height="22"/>
    <rect x="730" y="440" width="22" height="22"/>
    <rect x="770" y="440" width="22" height="22"/>
    <rect x="810" y="440" width="22" height="22"/>
    <rect x="850" y="440" width="22" height="22"/>
    <rect x="890" y="440" width="22" height="22"/>

    <rect x="960" y="390" width="18" height="18"/>
    <rect x="990" y="390" width="18" height="18"/>
    <rect x="1020" y="390" width="18" height="18"/>
    <rect x="1050" y="390" width="18" height="18"/>
    <rect x="1080" y="390" width="18" height="18"/>
    <rect x="1110" y="390" width="18" height="18"/>
  </g>

  <!-- conveyor belt with bottles, front foreground -->
  <g transform="translate(0, 0)">
    <!-- conveyor -->
    <rect x="0" y="540" width="1200" height="60" fill="#1a2530"/>
    <g stroke="#3a4856" stroke-width="1" opacity="0.6">
      <line x1="0" y1="556" x2="1200" y2="556"/>
      <line x1="0" y1="586" x2="1200" y2="586"/>
    </g>
    <!-- belt segments -->
    <g fill="#2a3540">
      <rect x="50"  y="554" width="40" height="32"/>
      <rect x="130" y="554" width="40" height="32"/>
      <rect x="210" y="554" width="40" height="32"/>
      <rect x="290" y="554" width="40" height="32"/>
      <rect x="370" y="554" width="40" height="32"/>
      <rect x="450" y="554" width="40" height="32"/>
      <rect x="530" y="554" width="40" height="32"/>
      <rect x="610" y="554" width="40" height="32"/>
      <rect x="690" y="554" width="40" height="32"/>
      <rect x="770" y="554" width="40" height="32"/>
      <rect x="850" y="554" width="40" height="32"/>
      <rect x="930" y="554" width="40" height="32"/>
      <rect x="1010" y="554" width="40" height="32"/>
      <rect x="1090" y="554" width="40" height="32"/>
    </g>

    <!-- bottles on the belt -->
    <g transform="translate(140, 460)">
      <rect x="0" y="20" width="28" height="80" fill="url(#water)" stroke="#7cc9e6" stroke-width="1.2" rx="3"/>
      <rect x="6" y="8" width="16" height="14" fill="#c64b1e"/>
      <rect x="4" y="4" width="20" height="6" fill="#a83a14"/>
      <rect x="0" y="55" width="28" height="14" fill="#fff" opacity="0.7"/>
    </g>

    <g transform="translate(310, 460)">
      <rect x="0" y="20" width="28" height="80" fill="url(#water)" stroke="#7cc9e6" stroke-width="1.2" rx="3"/>
      <rect x="6" y="8" width="16" height="14" fill="#c64b1e"/>
      <rect x="4" y="4" width="20" height="6" fill="#a83a14"/>
      <rect x="0" y="55" width="28" height="14" fill="#fff" opacity="0.7"/>
    </g>

    <g transform="translate(480, 460)">
      <rect x="0" y="20" width="28" height="80" fill="url(#water)" stroke="#7cc9e6" stroke-width="1.2" rx="3"/>
      <rect x="6" y="8" width="16" height="14" fill="#c64b1e"/>
      <rect x="4" y="4" width="20" height="6" fill="#a83a14"/>
      <rect x="0" y="55" width="28" height="14" fill="#fff" opacity="0.7"/>
    </g>

    <g transform="translate(650, 460)">
      <rect x="0" y="20" width="28" height="80" fill="url(#water)" stroke="#7cc9e6" stroke-width="1.2" rx="3"/>
      <rect x="6" y="8" width="16" height="14" fill="#c64b1e"/>
      <rect x="4" y="4" width="20" height="6" fill="#a83a14"/>
      <rect x="0" y="55" width="28" height="14" fill="#fff" opacity="0.7"/>
    </g>

    <g transform="translate(820, 460)">
      <rect x="0" y="20" width="28" height="80" fill="url(#water)" stroke="#7cc9e6" stroke-width="1.2" rx="3"/>
      <rect x="6" y="8" width="16" height="14" fill="#c64b1e"/>
      <rect x="4" y="4" width="20" height="6" fill="#a83a14"/>
      <rect x="0" y="55" width="28" height="14" fill="#fff" opacity="0.7"/>
    </g>

    <g transform="translate(990, 460)">
      <rect x="0" y="20" width="28" height="80" fill="url(#water)" stroke="#7cc9e6" stroke-width="1.2" rx="3"/>
      <rect x="6" y="8" width="16" height="14" fill="#c64b1e"/>
      <rect x="4" y="4" width="20" height="6" fill="#a83a14"/>
      <rect x="0" y="55" width="28" height="14" fill="#fff" opacity="0.7"/>
    </g>
  </g>

  <!-- water droplet sparkles (top) -->
  <g fill="#7cc9e6" opacity="0.6">
    <circle cx="320" cy="200" r="3"/>
    <circle cx="700" cy="160" r="2"/>
    <circle cx="1050" cy="120" r="3"/>
    <circle cx="160" cy="120" r="2"/>
  </g>

  <!-- network lines -->
  <g stroke="#c64b1e" stroke-width="1.2" opacity="0.4" fill="none">
    <line x1="170" y1="320" x2="170" y2="80"/>
    <line x1="560" y1="280" x2="560" y2="100"/>
    <line x1="170" y1="80" x2="560" y2="100"/>
    <line x1="560" y1="100" x2="850" y2="150"/>
    <line x1="850" y1="150" x2="1050" y2="80"/>
  </g>
  <g fill="#c64b1e">
    <circle cx="170" cy="80" r="3"/>
    <circle cx="560" cy="100" r="3"/>
    <circle cx="850" cy="150" r="4"/>
    <circle cx="1050" cy="80" r="3"/>
  </g>
</svg>
