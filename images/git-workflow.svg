<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" font-family="Segoe UI, Tahoma, sans-serif">
  <rect width="900" height="360" fill="#fdfbf6"/>
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#14202b">Git — The Three Zones</text>

  <!-- Working Dir -->
  <rect x="40" y="70" width="240" height="180" fill="#eef2f5" stroke="#3a4856" stroke-width="2"/>
  <text x="160" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#14202b">Working Directory</text>
  <text x="160" y="120" text-anchor="middle" font-size="11" fill="#5b6770">where you edit files</text>

  <rect x="70" y="140" width="80" height="22" fill="#fff" stroke="#3a4856"/>
  <text x="110" y="156" text-anchor="middle" font-size="11" fill="#14202b">main.py *</text>

  <rect x="170" y="140" width="80" height="22" fill="#fff" stroke="#3a4856"/>
  <text x="210" y="156" text-anchor="middle" font-size="11" fill="#14202b">utils.py</text>

  <rect x="70" y="170" width="80" height="22" fill="#fff" stroke="#3a4856"/>
  <text x="110" y="186" text-anchor="middle" font-size="11" fill="#14202b">README *</text>

  <rect x="170" y="170" width="80" height="22" fill="#fff" stroke="#3a4856"/>
  <text x="210" y="186" text-anchor="middle" font-size="11" fill="#14202b">config.json</text>

  <text x="160" y="225" text-anchor="middle" font-size="11" font-style="italic" fill="#c64b1e">* = modified</text>

  <!-- Arrow git add -->
  <line x1="290" y1="160" x2="320" y2="160" stroke="#c64b1e" stroke-width="2"/>
  <polygon points="318,155 318,165 330,160" fill="#c64b1e"/>
  <text x="305" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#c64b1e">git add</text>

  <!-- Staging -->
  <rect x="330" y="70" width="240" height="180" fill="#fef0e8" stroke="#c64b1e" stroke-width="2"/>
  <text x="450" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#14202b">Staging Area</text>
  <text x="450" y="120" text-anchor="middle" font-size="11" fill="#5b6770">files ready to commit</text>

  <rect x="360" y="140" width="80" height="22" fill="#fff" stroke="#c64b1e"/>
  <text x="400" y="156" text-anchor="middle" font-size="11" fill="#14202b">main.py</text>

  <rect x="460" y="140" width="80" height="22" fill="#fff" stroke="#c64b1e"/>
  <text x="500" y="156" text-anchor="middle" font-size="11" fill="#14202b">README</text>

  <!-- Arrow git commit -->
  <line x1="580" y1="160" x2="610" y2="160" stroke="#3a8060" stroke-width="2"/>
  <polygon points="608,155 608,165 620,160" fill="#3a8060"/>
  <text x="595" y="148" text-anchor="middle" font-size="11" font-weight="700" fill="#3a8060">git commit</text>

  <!-- History -->
  <rect x="620" y="70" width="240" height="180" fill="#eaf3ee" stroke="#3a8060" stroke-width="2"/>
  <text x="740" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#14202b">Commit History</text>
  <text x="740" y="120" text-anchor="middle" font-size="11" fill="#5b6770">permanent snapshots</text>

  <g font-family="Consolas, monospace" font-size="11" fill="#235843">
    <circle cx="660" cy="155" r="6" fill="#3a8060"/>
    <text x="680" y="159">a3f1c · feat: add HMI</text>

    <circle cx="660" cy="180" r="6" fill="#3a8060"/>
    <text x="680" y="184">7b2e9 · fix: ink station</text>

    <circle cx="660" cy="205" r="6" fill="#3a8060"/>
    <text x="680" y="209">e44d8 · initial commit</text>

    <line x1="660" y1="161" x2="660" y2="174" stroke="#3a8060" stroke-width="2"/>
    <line x1="660" y1="186" x2="660" y2="199" stroke="#3a8060" stroke-width="2"/>
  </g>

  <!-- bottom -->
  <text x="450" y="290" text-anchor="middle" font-size="12" fill="#5b6770">git push  →  remote repository (GitHub, GitLab, etc.)</text>
  <line x1="280" y1="310" x2="620" y2="310" stroke="#c64b1e" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="450" y="330" text-anchor="middle" font-size="11" fill="#c64b1e">git restore = throw away working-dir changes</text>
</svg>
